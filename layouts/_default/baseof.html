<!DOCTYPE html>
<html lang="{{ .Language.Lang }}" {{ if eq .Language.LanguageDirection "rtl" }}dir="rtl" {{ end }}>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>

  <!-- Favicon here-->
  <link rel="apple-touch-icon" sizes="180x180" href="{{ .Site.BaseURL }}favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ .Site.BaseURL }}favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ .Site.BaseURL }}favicon_io/favicon-16x16.png">
  <link rel="manifest" href="{{ .Site.BaseURL }}favicon_io/site.webmanifest">
  <link rel="preload" href="https://cdn.tailwindcss.com" as="script">
  <link rel="preload" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" as="style">
  <style>
    html,
    body {
      background-color: #FFFFFF;
      color: #1f2937;
    }

    html.dark,
    html.dark body {
      background-color: #121212;
      color: #f3f4f6;
    }

    .border {
      border-color: #d4d4d8;
    }

    html.dark .border {
      border-color: #374151;
    }

    .carousel-item {
      display: inline-block;
      margin: 0 1rem;
    }

    .flex {
      display: flex;
    }

    .flex-col {
      flex-direction: column;
    }

    @media (min-width: 768px) {
      .md\:flex-row {
        flex-direction: row;
      }
    }

    .tech-carousel {
      overflow: hidden;
      width: 100%;
      padding: 1rem 0;
    }

    .carousel-track {
      white-space: nowrap;
    }

    /* RTL Support */
    html[dir="rtl"] {
      font-family: 'Space Grotesk', 'Noto Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
    }

    html[dir="rtl"] .pl-8 {
      padding-left: 0;
      padding-right: 2rem;
    }

    html[dir="rtl"] .before\:left-0::before,
    html[dir="rtl"] .relative.pl-8::before {
      left: auto;
      right: 0;
    }

    html[dir="rtl"] .-left-1\.5 {
      left: auto;
      right: -0.375rem;
    }

    html[dir="rtl"] .pl-4 {
      padding-left: 0;
      padding-right: 1rem;
    }

    html[dir="rtl"] .border-l-2 {
      border-left-width: 0;
      border-right-width: 2px;
    }

    html[dir="rtl"] .ml-4 {
      margin-left: 0;
      margin-right: 1rem;
    }

    html[dir="rtl"] .mr-2 {
      margin-right: 0;
      margin-left: 0.5rem;
    }

    html[dir="rtl"] .ml-1 {
      margin-left: 0;
      margin-right: 0.25rem;
    }

    html[dir="rtl"] .ml-0 {
      margin-left: auto;
      margin-right: 0;
    }

    html[dir="rtl"] .text-left {
      text-align: right;
    }
  </style>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" type='text/css' href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
  <script>
    if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
  <style>
    :root {
      color-scheme: light dark;
    }

    .tech-icon {
      filter: grayscale(100%) brightness(200%);
      transition: all 0.3s ease;
    }

    .tech-icon:hover {
      filter: none;
    }

    @keyframes scroll {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-100%);
      }
    }

    .tech-carousel {
      width: 100%;
      padding: 1rem 0;
    }

    .tech-track {
      width: fit-content;
      animation: scroll 20s linear infinite;
    }

    .tech-track:hover {
      animation-play-state: paused;
    }

    .tech-slide {
      float: left;
    }
  </style>
  <!-- Load Noto Sans Arabic for RTL -->
  {{ if eq .Language.LanguageDirection "rtl" }}
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans Arabic', 'Space Grotesk', sans-serif !important;
    }
    .carousel-track {
        animation-name: scroll-rtl !important;
    }
    .carousel-track-left-to-right {
        animation-name: scroll-left-to-right-rtl !important;
    }
    .carousel-track-reverse {
        animation-name: scroll-reverse-rtl !important;
    }
    
    @keyframes scroll-rtl {
        0% { transform: translateX(0); }
        100% { transform: translateX(calc(100% / 2)); }
    }
    
    @keyframes scroll-left-to-right-rtl {
        0% { transform: translateX(calc(100% / 2)); }
        100% { transform: translateX(0); }
    }
    
    @keyframes scroll-reverse-rtl {
        0% { transform: translateX(0); }
        100% { transform: translateX(calc(100% / 2)); }
    }
  </style>
  {{ end }}
</head>

<body
  class="min-h-screen bg-bg-primary-light dark:bg-bg-primary-dark text-text-primary-light dark:text-text-primary-dark">
  {{ partial "header" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer" . }}
</body>

</html>
